[phases.setup]
nixPkgs = ["nodejs_20", "python3", "ffmpeg", "uv"]

[phases.install]
cmds = [
  "npm install",
  "pip install -r python_api/requirements.txt",
  "uv tool install -U yt-dlp",
  "uv tool install -U instaloader"
]

# Pastikan binary uv tools ada di PATH saat runtime
[variables]
PATH = "/home/railway/.local/bin:/root/.local/bin:$PATH"

[start]
cmd = "chmod +x start.sh && ./start.sh"