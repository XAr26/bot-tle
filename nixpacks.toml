[phases.setup]
nixPkgs = ["nodejs_20", "python3", "ffmpeg", "uv"]

[phases.install]
cmds = [
  "npm install",
  "uv tool install yt-dlp",
  "uv tool install instaloader"
]

# Pastikan binary uv tools ada di PATH saat runtime
[variables]
PATH = "/home/railway/.local/bin:/root/.local/bin:$PATH"

[start]
cmd = "node src/index.js"